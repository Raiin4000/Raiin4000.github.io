<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Procurar em varios lugar</title>
        <link rel="icon" type="image/png" href="img/blue.png">
    </head>
    <style>
        body {font-family: 'Comic Sans MS', cursive;}
        input {font-family: 'Comic Sans MS', cursive;}
    </style>
    <body style="margin: 0; background-image: url('img/backbackground.png'); background-size: cover; background-attachment: fixed; background-position: center;">
        <div style="position: relative; width: 100%; display: flex; flex-direction: column; align-items: center;">
            <h1>Sites que eu procuro coisas</h1>
            <!--Youtube-->
            <form action='https://youtube.com' method='GET' id='form-hyt' style="margin: 0; padding: 0;">
                <input type="image" src="img/youtube.png" width="200px" style="display: block; margin: 20px auto; padding: 0;">
            </form>
            <form action='https://youtube.com/results' method='GET' id='form-syt' style="margin: 0px auto 0 auto; padding: 0; position: relative; z-index: 10;">
                <input type='search' name='search_query' id='syt'>
            </form>
            <!--Pinterest-->
                        <form action='https://br.pinterest.com' method='GET' id='form-hyt' style="margin: 0; padding: 0;">
                <input type="image" src="img/pinterest.png" width="200px" style="display: block; margin: 20px auto; padding: 0;">
            </form>
            <form action='https://br.pinterest.com/search/pins/?q=' method='GET' id='form-syt' style="margin: 0px auto 0 auto; padding: 0; position: relative; z-index: 10;">
                <input type='search' name='search_query' id='syt'>
            </form>
            <!--Google-->
                        <form action='https://www.google.com' method='GET' id='form-hyt' style="margin: 0; padding: 0;">
                <input type="image" src="img/google.png" width="200px" style="display: block; margin: 20px auto; padding: 0;">
            </form>
            <form action='https://www.google.com/search?q=' method='GET' id='form-syt' style="margin: 0px auto 0 auto; padding: 0; position: relative; z-index: 10;">
                <input type='search' name='search_query' id='syt'>
            </form>
        </div>
    </body>
</html>
